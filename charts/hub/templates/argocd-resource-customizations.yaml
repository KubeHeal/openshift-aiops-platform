{{- if .Values.argocd.customizeSubscriptionHealth | default true }}
---
# Patch argocd-cm to add a custom Subscription health check.
# The built-in ArgoCD check marks a Subscription as Degraded when
# InstallPlanFailed=True, even when state=AtLatestKnown (operator already
# installed and running). This override returns Healthy for AtLatestKnown,
# preserving Degraded only for real catalog-source outages.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: {{ .Values.main.namespace }}-hub
  labels:
    app.kubernetes.io/name: argocd-cm
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
data:
  resource.customizations.health.operators.coreos.com_Subscription: |
    hs = {}
    if obj.status ~= nil then
      if obj.status.state == "AtLatestKnown" then
        hs.status = "Healthy"
        hs.message = "Subscription is at the latest known version"
        return hs
      end
      if obj.status.state == "UpgradePending" then
        hs.status = "Progressing"
        hs.message = "Subscription upgrade pending"
        return hs
      end
      if obj.status.conditions ~= nil then
        for i, condition in pairs(obj.status.conditions) do
          if condition.type == "CatalogSourcesUnhealthy" and condition.status == "True" then
            hs.status = "Degraded"
            hs.message = condition.message
            return hs
          end
        end
      end
    end
    hs.status = "Progressing"
    hs.message = "Waiting for subscription"
    return hs
{{- end }}
