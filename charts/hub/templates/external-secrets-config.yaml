{{- if eq .Values.secrets.backend "external-secrets" }}
---
# ExternalSecretsConfig for OpenShift External Secrets Operator
# This resource is REQUIRED for OpenShift ESO (different from upstream architecture)
# Without this, the ESO operator will NOT deploy the external-secrets controller
# Sync wave -7: Must deploy before SecretStore (-5) to ensure controller is running
apiVersion: operator.openshift.io/v1alpha1
kind: ExternalSecretsConfig
metadata:
  name: cluster
  labels:
    app.kubernetes.io/name: external-secrets-operator
    app.kubernetes.io/component: config
  annotations:
    argocd.argoproj.io/sync-wave: "-7"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  managementState: Managed
{{- end }}
