{{- if .Values.operators }}
{{- if index .Values.operators "odf" }}
{{- if (index .Values.operators "odf").enabled }}
---
# ODF Operator - Namespace
# Creates openshift-storage namespace for ODF components
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-storage
  labels:
    openshift.io/cluster-monitoring: "true"
    app.kubernetes.io/name: odf-operator
    app.kubernetes.io/part-of: {{ .Values.global.pattern | default "self-healing-platform" }}
    app.kubernetes.io/managed-by: validated-patterns
  annotations:
    argocd.argoproj.io/sync-wave: "-11"
    openshift.io/description: "OpenShift Data Foundation storage"
---
# ODF Operator - OperatorGroup
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: openshift-storage-operatorgroup
  namespace: openshift-storage
  labels:
    app.kubernetes.io/name: odf-operator
    app.kubernetes.io/part-of: {{ .Values.global.pattern | default "self-healing-platform" }}
  annotations:
    argocd.argoproj.io/sync-wave: "-11"
spec:
  targetNamespaces:
  - openshift-storage
---
# ODF Operator - Subscription
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: odf-operator
  namespace: openshift-storage
  labels:
    app.kubernetes.io/name: odf-operator
    app.kubernetes.io/part-of: {{ .Values.global.pattern | default "self-healing-platform" }}
  annotations:
    argocd.argoproj.io/sync-wave: "-11"
spec:
  channel: {{ (index .Values.operators "odf").channel | default "stable-4.18" }}
  name: odf-operator
  source: {{ (index .Values.operators "odf").source | default "redhat-operators" }}
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
{{- end }}
{{- end }}
{{- end }}
