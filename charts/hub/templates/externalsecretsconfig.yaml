{{- if eq (.Values.secrets.backend | default "external-secrets") "external-secrets" }}
---
# ExternalSecretsConfig - Red Hat Managed External Secrets Operator Configuration
# This tells the Red Hat operator to deploy the core External Secrets components
# Reference: https://docs.redhat.com/en/documentation/red_hat_openshift_platform_plus/4.17/html/external_secrets_operator
apiVersion: operator.openshift.io/v1alpha1
kind: ExternalSecretsConfig
metadata:
  name: cluster
  labels:
    app.kubernetes.io/name: external-secrets-operator
    app.kubernetes.io/part-of: {{ .Values.global.pattern | default "self-healing-platform" }}
  annotations:
    argocd.argoproj.io/sync-wave: "-7"  # Apply before SecretStore (wave -5) and RBAC (wave -6)
spec:
  # Minimal spec - operator will use defaults
  # Valid spec fields: appConfig, controllerConfig, plugins
  # The operator automatically manages the deployment when this CR exists
  {{- if .Values.externalSecrets }}
  {{- if .Values.externalSecrets.controllerConfig }}
  controllerConfig:
    {{- toYaml .Values.externalSecrets.controllerConfig | nindent 4 }}
  {{- end }}
  {{- end }}
{{- end }}
