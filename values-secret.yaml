# values-secret.yaml
# OpenShift AIOps Self-Healing Platform - Secrets Configuration
#
# ============================================================================
# IMPORTANT: This file is committed to Git but contains NO real secrets.
# ============================================================================
#
# This file exists to satisfy the Validated Patterns framework requirement for
# a secrets file during pattern installation (`./pattern.sh make install`).
#
# WHY THIS FILE EXISTS:
# - Validated Patterns Ansible roles use `first_found` to locate secret files
# - Without this file, installation fails with "No file was found" error
# - This empty template prevents the failure while maintaining security
#
# FOR PRODUCTION DEPLOYMENTS:
# 1. DO NOT use this file as-is - it contains no real credentials
# 2. Copy this template and populate with actual secrets:
#    cp values-secret.yaml values-secret-production.yaml
# 3. Store the populated file securely (vault, encrypted storage)
# 4. DO NOT commit real secrets to Git - add to .gitignore
# 5. External Secrets Operator syncs production secrets from external sources
#
# EXTERNAL SECRETS ARCHITECTURE:
# - External Secrets Operator (ESO) reads secrets from external sources
# - SecretStores define backend connections (Vault, AWS, Kubernetes, etc.)
# - ExternalSecret resources define which secrets to sync
# - ESO automatically creates Kubernetes Secrets from external sources
# - Applications consume the generated Kubernetes Secrets
#
# DOCUMENTATION:
# - See VALUES-FILES-GUIDE.md for detailed secret management guidance
# - See ADR-026: Secrets Management Automation (MANDATORY)
# - See ADR-024: External Secrets for Model Storage
#
# References:
# - Issue #81: Secret loading fails when values-secret.yaml missing
# - Plan: v1.0.0 Prerequisites Job for VP compliance
# ============================================================================

version: "1.0"

# Secrets configuration
secrets:
  # Placeholder - External Secrets Operator manages real secrets
  # Set to false to indicate this file contains no real credentials
  enabled: false

# Git credentials (if not using public repository)
# PRODUCTION: Populate these for private repositories
# git:
#   username: ""
#   password: ""  # Personal access token or password
#   sshKey: ""    # SSH private key (base64 encoded)

# Object storage credentials (S3/NooBaa)
# PRODUCTION: ESO syncs these from noobaa-admin secret in openshift-storage
# objectStore:
#   accessKey: ""
#   secretKey: ""
#   endpoint: ""

# Model serving credentials
# PRODUCTION: ESO syncs these from model-storage-config secret
# models:
#   s3AccessKey: ""
#   s3SecretKey: ""

# External API credentials
# PRODUCTION: Add your external API keys here
# externalAPIs:
#   prometheusToken: ""
#   grafanaToken: ""

# Database credentials
# PRODUCTION: Add database credentials if using external databases
# database:
#   username: ""
#   password: ""
#   host: ""
#   port: ""

# ============================================================================
# REMINDER: This file is a template with NO real secrets.
# For production, create a separate values-secret-production.yaml and
# populate it with actual credentials. Never commit real secrets to Git.
# ============================================================================
