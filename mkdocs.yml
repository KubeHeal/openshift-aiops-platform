site_name: OpenShift AIOps Self-Healing Platform
site_url: https://kubeheal.github.io/openshift-aiops-platform/
site_description: Production-ready AIOps platform for OpenShift with ML-powered anomaly detection
site_author: KubeHeal Team
repo_url: https://github.com/KubeHeal/openshift-aiops-platform
repo_name: openshift-aiops-platform
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - awesome-pages  # Preserves docs/ structure
  - git-revision-date-localized:
      enable_creation_date: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - tables
  - footnotes

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: README.md
      - Deployment: DEPLOYMENT.md
      - Prerequisites: docs/guides/PREREQUISITES.md
  - Tutorials:
      - Overview: docs/tutorials/index.md
      - Getting Started: docs/tutorials/getting-started.md
      - Workbench Development: docs/tutorials/workbench-development.md
  - How-To Guides:
      - Overview: docs/how-to/index.md
      - Deploy on SNO: docs/how-to/deploy-on-sno.md
      - Access Workbench: docs/how-to/access-workbench.md
      - Deploy MCP Server: docs/how-to/deploy-mcp-server.md
  - Reference:
      - Overview: docs/reference/index.md
      - ADRs: docs/adrs/README.md
      - API Documentation: docs/reference/api.md
  - Explanation:
      - Overview: docs/explanation/index.md
      - Architecture: docs/explanation/architecture-overview.md
  - ADRs:
      - Index: docs/adrs/README.md
      - Cross-Reference: docs/adrs/ADR-CROSS-REFERENCE-MATRIX.md
      - Implementation Tracker: docs/adrs/IMPLEMENTATION-TRACKER.md
  - Guides:
      - Troubleshooting: docs/guides/TROUBLESHOOTING-GUIDE.md
      - Junior Developer: docs/guides/JUNIOR-DEVELOPER-DEPLOYMENT-GUIDE.md
      - CI/CD Integration: docs/guides/CICD-INTEGRATION-GUIDE.md
  - Blog:
      - Overview: docs/blog/index.md
  - Contributing:
      - Guidelines: CONTRIBUTING.md
      - Code of Conduct: CODE_OF_CONDUCT.md
      - Agents Guide: AGENTS.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/KubeHeal/openshift-aiops-platform
