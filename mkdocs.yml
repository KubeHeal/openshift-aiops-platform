site_name: OpenShift AIOps Self-Healing Platform
site_url: https://kubeheal.github.io/openshift-aiops-platform/
site_description: Production-ready AIOps platform for OpenShift with ML-powered anomaly detection
site_author: KubeHeal Team
repo_url: https://github.com/KubeHeal/openshift-aiops-platform
repo_name: openshift-aiops-platform
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - tables
  - footnotes

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: README.md
      - Deployment: DEPLOYMENT.md
      - Fresh Cluster Guide: guides/FRESH-CLUSTER-DEPLOYMENT.md
  - Tutorials:
      - Overview: tutorials/index.md
      - Getting Started: tutorials/getting-started.md
      - Deploy Your First ML Model: tutorials/deploy-first-ml-model.md
      - Build Self-Healing Automation: tutorials/build-first-self-healing-automation.md
      - Workbench Development: tutorials/workbench-development-guide.md
  - How-To Guides:
      - Overview: how-to/index.md
      - Deploy on SNO: how-to/deploy-on-sno.md
      - Access Workbench: how-to/access-workbench.md
      - Deploy MCP Server: how-to/deploy-mcp-server.md
  - Reference:
      - Overview: reference/index.md
      - ADRs: adrs/README.md
      - API Documentation: reference/api.md
  - Explanation:
      - Overview: explanation/index.md
      - Architecture: explanation/architecture-overview.md
  - ADRs:
      - Index: adrs/README.md
      - Cross-Reference: adrs/ADR-CROSS-REFERENCE-MATRIX.md
      - Implementation Tracker: adrs/IMPLEMENTATION-TRACKER.md
  - Guides:
      - Fresh Cluster Deployment: guides/FRESH-CLUSTER-DEPLOYMENT.md
      - Troubleshooting: guides/TROUBLESHOOTING-GUIDE.md
      - Validated Patterns Submission: guides/VALIDATED-PATTERNS-SUBMISSION.md
      - Junior Developer: guides/JUNIOR-DEVELOPER-DEPLOYMENT-GUIDE.md
      - CI/CD Integration: guides/CICD-INTEGRATION-GUIDE.md
  - Blog:
      - Overview: blog/index.md
  - Contributing:
      - Guidelines: CONTRIBUTING.md
      - Code of Conduct: CODE_OF_CONDUCT.md
      - Agents Guide: AGENTS.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/KubeHeal/openshift-aiops-platform
