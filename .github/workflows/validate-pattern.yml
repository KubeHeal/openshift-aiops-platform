name: Validate Pattern

# This workflow validates the pattern deployment on an OpenShift cluster.
#
# **Manual Trigger**: Go to Actions → Validate Pattern → Run workflow
#   - Provide your cluster API URL and login token
#   - Optionally skip installation to validate an existing deployment
#
# **Automatic Runs**: Triggered on push/PR to main
#   - Requires OCP_API_URL and OCP_TOKEN repository secrets
#   - Set in: Settings → Secrets and variables → Actions
#   - Can be disabled by setting SKIP_DEPLOY_VALIDATION=true variable

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      ocp_api_url:
        description: 'OpenShift API URL (e.g., https://api.cluster.example.com:6443)'
        required: true
        type: string
      ocp_token:
        description: 'OpenShift login token (from `oc whoami -t`)'
        required: true
        type: string
      skip_install:
        description: 'Skip pattern installation (validate existing deployment only)'
        required: false
        type: boolean
        default: false

jobs:
  validate:
    name: Pattern Deploy Validation
    runs-on: ubuntu-latest
    # Credentials can be provided in two ways:
    # 1. Manual trigger: Provide ocp_api_url and ocp_token as workflow inputs
    # 2. Automatic runs: Configure OCP_API_URL and OCP_TOKEN as repository secrets
    # Set repository variable SKIP_DEPLOY_VALIDATION=true to disable automatic runs
    if: ${{ vars.SKIP_DEPLOY_VALIDATION != 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Login to OpenShift
        run: |
          # Use workflow inputs if provided (manual trigger), otherwise use secrets (automatic runs)
          OCP_API_URL="${{ github.event.inputs.ocp_api_url || secrets.OCP_API_URL }}"
          OCP_TOKEN="${{ github.event.inputs.ocp_token || secrets.OCP_TOKEN }}"

          if [ -z "$OCP_API_URL" ] || [ -z "$OCP_TOKEN" ]; then
            echo "❌ ERROR: OpenShift credentials not provided"
            echo "For manual runs: Provide 'ocp_api_url' and 'ocp_token' inputs"
            echo "For automatic runs: Configure OCP_API_URL and OCP_TOKEN repository secrets"
            exit 1
          fi

          echo "🔐 Logging in to OpenShift cluster..."
          oc login "$OCP_API_URL" \
            --token="$OCP_TOKEN" \
            --insecure-skip-tls-verify

          echo "✅ Logged in as: $(oc whoami)"
          echo "🌐 Server: $(oc whoami --show-server)"

      - name: Install podman (required by pattern.sh)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y podman

      - name: Install pattern
        if: ${{ github.event.inputs.skip_install != 'true' }}
        run: ./pattern.sh make install

      - name: Wait for ArgoCD convergence
        timeout-minutes: 30
        run: |
          HUB_NS="self-healing-platform-hub"
          echo "Waiting for ArgoCD applications to converge in $HUB_NS..."
          for i in $(seq 1 60); do
            NOT_HEALTHY=$(oc get applications.argoproj.io -n "$HUB_NS" \
              -o jsonpath='{range .items[*]}{.status.health.status}{"\n"}{end}' \
              2>/dev/null | grep -v '^Healthy$' | wc -l)
            NOT_SYNCED=$(oc get applications.argoproj.io -n "$HUB_NS" \
              -o jsonpath='{range .items[*]}{.status.sync.status}{"\n"}{end}' \
              2>/dev/null | grep -v '^Synced$' | wc -l)
            echo "Attempt $i/60: not-healthy=$NOT_HEALTHY not-synced=$NOT_SYNCED"
            if [ "$NOT_HEALTHY" -eq 0 ] && [ "$NOT_SYNCED" -eq 0 ]; then
              echo "All ArgoCD applications are Synced/Healthy"
              exit 0
            fi
            sleep 30
          done
          echo "ERROR: ArgoCD convergence timeout after 30 minutes"
          oc get applications.argoproj.io -n "$HUB_NS"
          exit 1

      - name: Validate core workloads running
        run: |
          NS="self-healing-platform"
          echo "Checking core pods in $NS..."
          for deploy in coordination-engine mcp-server; do
            READY=$(oc get deployment "$deploy" -n "$NS" \
              -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
            if [ "${READY:-0}" -lt 1 ]; then
              echo "ERROR: $deploy has no ready replicas"
              oc get pods -n "$NS" -l "app=$deploy"
              exit 1
            fi
            echo "PASS: $deploy — $READY ready"
          done

      - name: Report pattern health
        if: always()
        run: |
          echo "=== ArgoCD Applications ==="
          oc get applications.argoproj.io -n self-healing-platform-hub 2>/dev/null || true
          echo "=== Core Pods ==="
          oc get pods -n self-healing-platform 2>/dev/null || true
          echo "=== Imperative Jobs ==="
          oc get jobs -n imperative 2>/dev/null || true
