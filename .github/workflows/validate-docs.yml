name: Validate Documentation

on:
  pull_request:
    paths:
      - 'docs/**'
      - '*.md'
  push:
    branches:
      - main

jobs:
  validate-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements-docs.txt
          npm install -g markdown-link-check

      - name: Build documentation (check for errors)
        run: mkdocs build

      - name: Check internal links
        run: |
          # Check internal links only (fast, reliable)
          # External links are checked separately and allowed to fail
          echo "🔍 Checking internal documentation links..."

          broken_links=0

          # Find all markdown files
          find docs -name "*.md" | while read file; do
            echo "Checking: $file"

            # Extract markdown links [text](path)
            grep -oP '\[.*?\]\(\K[^)]+' "$file" 2>/dev/null | while read link; do
              # Skip external URLs and anchors
              if [[ "$link" =~ ^https?:// ]] || [[ "$link" =~ ^# ]]; then
                continue
              fi

              # Resolve relative path
              dir=$(dirname "$file")
              target="$dir/$link"
              target=$(realpath -m "$target" 2>/dev/null || echo "$target")

              # Check if target exists
              if [ ! -f "$target" ] && [ ! -d "$target" ]; then
                echo "❌ BROKEN LINK in $file: $link -> $target"
                broken_links=$((broken_links + 1))
              fi
            done
          done

          # Check root-level markdown files
          for file in README.md CONTRIBUTING.md CLAUDE.md; do
            if [ -f "$file" ]; then
              echo "Checking: $file"
              grep -oP '\[.*?\]\(\K[^)]+' "$file" 2>/dev/null | while read link; do
                if [[ "$link" =~ ^https?:// ]] || [[ "$link" =~ ^# ]]; then
                  continue
                fi
                target=$(realpath -m "$link" 2>/dev/null || echo "$link")
                if [ ! -f "$target" ] && [ ! -d "$target" ]; then
                  echo "❌ BROKEN LINK in $file: $link -> $target"
                  broken_links=$((broken_links + 1))
                fi
              done
            fi
          done

          if [ $broken_links -gt 0 ]; then
            echo "❌ Found $broken_links broken internal link(s)"
            exit 1
          fi

          echo "✅ All internal links are valid"

      - name: Check external links (non-blocking)
        continue-on-error: true
        run: |
          echo "🌐 Checking external links (informational only)..."
          # Use markdown-link-check with config for external links
          # This step is allowed to fail (rate limits, temporary outages, etc.)
          find docs -name "*.md" -exec markdown-link-check --config .markdown-link-check.json {} \; || true
          markdown-link-check --config .markdown-link-check.json README.md || true
          markdown-link-check --config .markdown-link-check.json CONTRIBUTING.md || true
          echo "ℹ️ External link check completed (failures are informational only)"

      - name: Validate Diataxis structure
        run: |
          # Ensure Diataxis directories exist
          test -d docs/tutorials || exit 1
          test -d docs/how-to || exit 1
          test -d docs/reference || exit 1
          test -d docs/explanation || exit 1
          echo "✅ Diataxis structure validated"
