clusterGroup:
  name: hub
  isHubCluster: true
  imperative:
    jobs:
      - name: create-datasciencecluster
        playbook: ansible/playbooks/create-datasciencecluster.yaml
  namespaces:
    - self-healing-platform:
        labels:
          openshift.io/cluster-monitoring: "true"
        annotations:
          openshift.io/description: "Self-Healing Platform for AIOps automation"
    - external-secrets-operator:
        operatorGroup: true
        targetNamespaces: []
    - external-secrets
    - jupyter-notebook-validator-operator
    - redhat-ods-operator
    - openshift-serverless
  subscriptions:
    eso:
      name: openshift-external-secrets-operator
      namespace: external-secrets-operator
      channel: stable-v1
      source: redhat-operators
      startingCSV: openshift-external-secrets-operator.v1.1.0
    jupyter-notebook-validator:
      name: jupyter-notebook-validator-operator
      namespace: jupyter-notebook-validator-operator
      channel: alpha
      source: community-operators
      startingCSV: jupyter-notebook-validator-operator.v1.0.2
    openshift-ai:
      name: rhods-operator
      namespace: redhat-ods-operator
      channel: stable
      source: redhat-operators
      startingCSV: rhods-operator.3.3.2
    openshift-pipelines:
      name: openshift-pipelines-operator-rh
      namespace: openshift-operators
      channel: latest
      source: redhat-operators
      startingCSV: openshift-pipelines-operator-rh.v1.21.1
    serverless:
      name: serverless-operator
      namespace: openshift-serverless
      channel: stable
      source: redhat-operators
      startingCSV: serverless-operator.v1.37.1
  applications:
    self-healing-platform:
      name: self-healing-platform
      namespace: self-healing-platform
      project: default
      path: charts/hub
      helm:
        valueFiles:
          - /values-global.yaml
          - /values-hub.yaml
          - charts/hub/values-notebooks-validation.yaml
      ignoreDifferences:
        - group: '*'
          kind: '*'
          managedFieldsManagers:
            - kube-controller-manager
        - group: external-secrets.io
          jqPathExpressions:
            - .status
          kind: ExternalSecret
        - jqPathExpressions:
            - .status
          kind: PersistentVolumeClaim
        - group: serving.kserve.io
          jqPathExpressions:
            - .status
          kind: InferenceService
      repoURL: https://github.com/KubeHeal/openshift-aiops-platform.git
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
          limit: 5
        syncOptions:
          - CreateNamespace=true
          - Validate=false
          - RespectIgnoreDifferences=true
          - ServerSideApply=true
      targetRevision: main
cluster:
  topology: sno
  version: "4.20"
features:
  aiml: true
  beta: false
  edge: false
  experimental: false
main:
  clusterGroupName: hub
  gitOpsOperator: openshift-gitops
  namespace: self-healing-platform
  targetSite: hub
metadata:
  costCenter: ""
  environment: development
  owner: platform-team
  tags:
    framework: openshift-gitops
    managed-by: validated-patterns
    project: self-healing-platform
    version: 1.0.0
modelServing:
  enabled: true
  sklearn:
    image: image-registry.openshift-image-registry.svc:5000/self-healing-platform/sklearn-xgboost-server:latest
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi
  tensorflow:
    image: kserve/tfserving:latest
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 200m
        memory: 512Mi
monitoring:
  alerting:
    enabled: true
  grafana:
    adminPassword: ""
    enabled: true
  prometheus:
    enabled: true
    retention: 30d
  serviceMonitors:
    - coordination-engine
    - mcp-server
    - self-healing-platform
namespace:
  create: false
  git:
    repoURL: ""
    revision: ""
  helm:
    clusterGroupChartVersion: 0.9.*
    extraValues: []
  name: self-healing-platform
networking:
  ingress:
    className: openshift
    enabled: true
  networkPolicies: true
  serviceMesh: false
notebooks:
  validation:
    buildConfig:
      baseImage: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/pytorch:2025.1
      enabled: true
      imageChangeTrigger: true
      noCache: false
      pullSecret: ""
    containerImage: image-registry.openshift-image-registry.svc:5000/self-healing-platform/notebook-validator:latest
    enabled: true
    fallbackImage: quay.io/jupyter/scipy-notebook:latest
    git:
      credentialsSecret: github-pat-credentials
      ref: main
      url: ""
    gpu:
      count: "1"
      enabled: false
    operatorImage: quay.io/takinosh/jupyter-notebook-validator-operator:release-4.20-f655671
    operatorResources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    resources:
      limits:
        cpu: 2000m
        memory: 4Gi
      requests:
        cpu: 1000m
        memory: 2Gi
    tierImages:
      tier1: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/s2i-minimal-notebook:2025.1
      tier2: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/pytorch:2025.1
      tier3: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/pytorch:2025.1
    tiers:
      tier1:
        enabled: true
        notebooks:
          - notebooks/00-setup/00-platform-readiness-validation.ipynb
          - notebooks/01-data-collection/prometheus-metrics-collection.ipynb
          - notebooks/01-data-collection/openshift-events-analysis.ipynb
      tier2:
        enabled: true
        notebooks:
          - notebooks/02-anomaly-detection/01-isolation-forest-implementation.ipynb
          - notebooks/02-anomaly-detection/02-time-series-anomaly-detection.ipynb
          - notebooks/03-self-healing-logic/coordination-engine-integration.ipynb
        resources:
          limits:
            cpu: 4000m
            memory: 8Gi
          requests:
            cpu: 2000m
            memory: 4Gi
        timeout: 30m
      tier3:
        enabled: false
        notebooks:
          - notebooks/04-model-serving/kserve-model-deployment.ipynb
          - notebooks/05-end-to-end-scenarios/pod-crash-loop-healing.ipynb
          - notebooks/05-end-to-end-scenarios/resource-exhaustion-detection.ipynb
        resources:
          limits:
            cpu: 6000m
            memory: 12Gi
          requests:
            cpu: 3000m
            memory: 6Gi
    timeout: 30m
objectStore:
  enabled: false
  buckets:
    inferenceResults: inference-results
    models: model-storage
    trainingData: training-data
  endpoint: https://s3.openshift-storage.svc:443
  region: us-east-1
  sslVerify: false
gitea:
  enabled: false

secrets:
  backend: external-secrets
security:
  networkPolicies: true
  podSecurityPolicies: true
  rbac: true
storage:
  dataVolumeSize: 5Gi
  logsVolumeSize: 5Gi
  modelArtifacts:
    size: 50Gi
    storageClass: gp3-csi
  modelStorage:
    size: 10Gi
    storageClass: gp3-csi
  modelsVolumeSize: 10Gi
  selfHealingData:
    size: 10Gi
    storageClass: gp3-csi
  storageClass: gp3-csi
  workbenchData:
    size: 20Gi
    storageClass: gp3-csi
workbench:
  enabled: true
  gpu:
    enabled: true
