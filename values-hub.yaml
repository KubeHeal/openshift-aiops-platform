clusterGroup:
  name: hub
  namespaces:
    - self-healing-platform
    - vault
    - external-secrets-operator:
        operatorGroup: true
        targetNamespaces: []
    - external-secrets
    - annotations:
        openshift.io/description: Self-Healing Platform for AIOps automation
      labels:
        openshift.io/cluster-monitoring: "true"
      name: self-healing-platform
  subscriptions:
    eso:
      name: openshift-external-secrets-operator
      namespace: external-secrets-operator
      channel: stable-v1
  applications:
    hub:
      name: hub
      namespace: self-healing-platform
      path: charts/hub
    openshift-external-secrets:
      name: openshift-external-secrets
      namespace: external-secrets
      chart: openshift-external-secrets
      chartVersion: 0.0.*
    self-healing-platform:
      name: self-healing-platform
      namespace: self-healing-platform
      project: default
      path: charts/hub
      helm:
        valueFiles:
          - /values-global.yaml
          - /values-hub.yaml
          - charts/hub/values-notebooks-validation.yaml
      ignoreDifferences:
        - group: '*'
          kind: '*'
          managedFieldsManagers:
            - kube-controller-manager
        - group: external-secrets.io
          jqPathExpressions:
            - .status
          kind: ExternalSecret
        - jqPathExpressions:
            - .status
          kind: PersistentVolumeClaim
        - group: serving.kserve.io
          jqPathExpressions:
            - .status
          kind: InferenceService
      repoURL: https://github.com/tosin2013/openshift-aiops-platform.git
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
          limit: 5
        syncOptions:
          - CreateNamespace=true
          - Validate=false
          - RespectIgnoreDifferences=true
          - ServerSideApply=true
      targetRevision: main
    vault:
      name: vault
      namespace: vault
      chart: hashicorp-vault
      chartVersion: 0.1.*
  isHubCluster: true
applications:
  self-healing-platform:
    coordination-engine:
      enabled: true
      image: coordination-engine:latest
      replicas: 1
    enabled: true
    model-serving:
      enabled: true
      models:
        - framework: sklearn
          name: anomaly-detector
        - framework: tensorflow
          name: predictive-analytics
    monitoring:
      enabled: true
      grafana: true
      prometheus: true
    namespace: self-healing-platform
    notebooks:
      enabled: true
      workbench:
        image: jupyter-minimal-notebook:latest
        name: self-healing-workbench
cluster:
  topology: sno
  version: "4.20"
features:
  aiml: true
  beta: false
  edge: false
  experimental: false
main:
  clusterGroupName: hub
  gitOpsOperator: openshift-gitops
  namespace: self-healing-platform
  targetSite: hub
metadata:
  costCenter: ""
  environment: development
  owner: platform-team
  tags:
    framework: openshift-gitops
    managed-by: validated-patterns
    project: self-healing-platform
    version: 1.0.0
modelServing:
  enabled: true
  sklearn:
    image: image-registry.openshift-image-registry.svc:5000/self-healing-platform/sklearn-xgboost-server:latest
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi
  tensorflow:
    image: kserve/tfserving:latest
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 200m
        memory: 512Mi
monitoring:
  alerting:
    enabled: true
  grafana:
    adminPassword: ""
    enabled: true
  prometheus:
    enabled: true
    retention: 30d
  serviceMonitors:
    - coordination-engine
    - mcp-server
    - self-healing-platform
namespace:
  create: false
  git:
    repoURL: ""
    revision: ""
  helm:
    clusterGroupChartVersion: 0.9.*
    extraValues: []
  name: self-healing-platform
networking:
  ingress:
    className: openshift
    enabled: true
  networkPolicies: true
  serviceMesh: false
notebooks:
  validation:
    buildConfig:
      baseImage: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/pytorch:2025.1
      enabled: true
      imageChangeTrigger: true
      noCache: false
      pullSecret: ""
    containerImage: image-registry.openshift-image-registry.svc:5000/self-healing-platform/notebook-validator:latest
    enabled: true
    fallbackImage: quay.io/jupyter/scipy-notebook:latest
    git:
      credentialsSecret: github-pat-credentials
      ref: main
      url: ""
    gpu:
      count: "1"
      enabled: false
    operatorImage: quay.io/takinosh/jupyter-notebook-validator-operator:release-4.20-f655671
    operatorResources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    resources:
      limits:
        cpu: 2000m
        memory: 4Gi
      requests:
        cpu: 1000m
        memory: 2Gi
    tierImages:
      tier1: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/s2i-minimal-notebook:2025.1
      tier2: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/pytorch:2025.1
      tier3: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/pytorch:2025.1
    tiers:
      tier1:
        enabled: true
        notebooks:
          - notebooks/00-setup/00-platform-readiness-validation.ipynb
          - notebooks/01-data-collection/prometheus-metrics-collection.ipynb
          - notebooks/01-data-collection/openshift-events-analysis.ipynb
      tier2:
        enabled: true
        notebooks:
          - notebooks/02-anomaly-detection/01-isolation-forest-implementation.ipynb
          - notebooks/02-anomaly-detection/02-time-series-anomaly-detection.ipynb
          - notebooks/03-self-healing-logic/coordination-engine-integration.ipynb
        resources:
          limits:
            cpu: 4000m
            memory: 8Gi
          requests:
            cpu: 2000m
            memory: 4Gi
        timeout: 30m
      tier3:
        enabled: false
        notebooks:
          - notebooks/04-model-serving/kserve-model-deployment.ipynb
          - notebooks/05-end-to-end-scenarios/pod-crash-loop-healing.ipynb
          - notebooks/05-end-to-end-scenarios/resource-exhaustion-detection.ipynb
        resources:
          limits:
            cpu: 6000m
            memory: 12Gi
          requests:
            cpu: 3000m
            memory: 6Gi
    timeout: 30m
objectStore:
  buckets:
    inferenceResults: inference-results
    models: model-storage
    trainingData: training-data
  enabled: true
  endpoint: https://s3.openshift-storage.svc:443
  region: us-east-1
  sslVerify: false
secrets:
  backend: external-secrets
  vault:
    address: ""
    authMethod: kubernetes
    namespace: ""
    role: self-healing-platform
    secretPath: secret/data/self-healing-platform
security:
  networkPolicies: true
  podSecurityPolicies: true
  rbac: true
  securityContext:
    fsGroup: 1000
    runAsNonRoot: true
    runAsUser: 1000
storage:
  dataVolumeSize: 5Gi
  logsVolumeSize: 5Gi
  modelArtifacts:
    size: 50Gi
    storageClass: gp3-csi
  modelStorage:
    size: 10Gi
    storageClass: gp3-csi
  modelsVolumeSize: 10Gi
  selfHealingData:
    size: 10Gi
    storageClass: gp3-csi
  storageClass: gp3-csi
  workbenchData:
    size: 20Gi
    storageClass: gp3-csi
workbench:
  enabled: true
  gpu:
    enabled: true
