---
# Configure Helm repositories for multisource architecture

- name: Ensure Helm cache directory exists
  ansible.builtin.file:
    path: "{{ lookup('env', 'HELM_CACHE_HOME') | default('/tmp/.helm/cache', true) }}/repository"
    state: directory
    mode: '0755'

- name: Set Helm environment for non-writable home directories
  ansible.builtin.set_fact:
    helm_env:
      HELM_CACHE_HOME: "{{ lookup('env', 'HELM_CACHE_HOME') | default('/tmp/.helm/cache', true) }}"
      HELM_CONFIG_HOME: "{{ lookup('env', 'HELM_CONFIG_HOME') | default('/tmp/.helm/config', true) }}"
      HELM_DATA_HOME: "{{ lookup('env', 'HELM_DATA_HOME') | default('/tmp/.helm/data', true) }}"

- name: Add Validated Patterns Helm repository
  kubernetes.core.helm_repository:
    name: validatedpatterns
    repo_url: https://charts.validatedpatterns.io
    state: present
  environment: "{{ helm_env }}"
  register: vp_repo

- name: Add Jetstack Helm repository
  kubernetes.core.helm_repository:
    name: jetstack
    repo_url: https://charts.jetstack.io
    state: present
  environment: "{{ helm_env }}"
  register: jetstack_repo

- name: Add External Secrets Helm repository
  kubernetes.core.helm_repository:
    name: external-secrets
    repo_url: https://external-secrets.github.io/external-secrets
    state: present
  environment: "{{ helm_env }}"
  register: external_secrets_repo

- name: Update Helm repositories
  ansible.builtin.command:
    cmd: helm repo update
  environment: "{{ helm_env }}"
  changed_when: true
  register: helm_update
  failed_when: false

- name: Display Helm repository configuration status
  debug:
    msg: |
      ✅ Helm repositories configured:
      - validatedpatterns: https://charts.validatedpatterns.io
      - jetstack: https://charts.jetstack.io
      - external-secrets: https://external-secrets.github.io/external-secrets
