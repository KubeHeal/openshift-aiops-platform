---
# Check cluster has sufficient resources

- name: Include cluster topology detection
  include_tasks: check_cluster_topology.yml

- name: Get cluster nodes
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Node
  register: cluster_nodes
  failed_when: cluster_nodes.resources | length == 0

- name: Set minimum requirements based on topology
  set_fact:
    min_nodes: "{{ validated_patterns_sno_min_nodes if cluster_topology == 'sno' else validated_patterns_min_nodes }}"
    min_cpu: "{{ validated_patterns_sno_min_cpu if cluster_topology == 'sno' else validated_patterns_min_cpu }}"
    min_memory: "{{ validated_patterns_sno_min_memory if cluster_topology == 'sno' else validated_patterns_min_memory }}"

- name: Validate minimum number of nodes
  assert:
    that:
      - cluster_nodes.resources | length >= min_nodes | int
    fail_msg: "Cluster has {{ cluster_nodes.resources | length }} nodes, minimum required is {{ min_nodes }} for {{ cluster_topology | upper }} topology"
    success_msg: "✅ Cluster has {{ cluster_nodes.resources | length }} nodes (minimum: {{ min_nodes }} for {{ cluster_topology | upper }})"

- name: Check node resources
  set_fact:
    node_resources: "{{ cluster_nodes.resources | map(attribute='status.allocatable') | list }}"

- name: Display node information
  debug:
    msg: |
      Cluster Nodes:
      {% for node in cluster_nodes.resources %}
      - {{ node.metadata.name }}: {{ node.status.allocatable.cpu }} CPU, {{ node.status.allocatable.memory }}
      {% endfor %}

- name: Validate cluster has sufficient CPU
  assert:
    that:
      - (cluster_nodes.resources | map(attribute='status.allocatable.cpu') | map('regex_replace', 'm$', '') | map('int') | sum) >= min_cpu | int
    fail_msg: "Cluster does not have sufficient CPU resources (minimum: {{ min_cpu }} cores for {{ cluster_topology | upper }})"
    success_msg: "✅ Cluster has sufficient CPU resources (minimum: {{ min_cpu }} cores for {{ cluster_topology | upper }})"

- name: Validate cluster has sufficient memory
  assert:
    that:
      - (cluster_nodes.resources | map(attribute='status.allocatable.memory') | map('regex_replace', 'Ki$', '') | map('int') | sum) >= (min_memory | int * 1024 * 1024)
    fail_msg: "Cluster does not have sufficient memory resources (minimum: {{ min_memory }}GB for {{ cluster_topology | upper }})"
    success_msg: "✅ Cluster has sufficient memory resources (minimum: {{ min_memory }}GB for {{ cluster_topology | upper }})"
