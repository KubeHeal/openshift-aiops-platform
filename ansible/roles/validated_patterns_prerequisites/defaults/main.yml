---
# Defaults for validated_patterns_prerequisites role

# Minimum OpenShift version
validated_patterns_min_openshift_version: "4.12"

# Minimum cluster resources (HA cluster)
validated_patterns_min_nodes: 3
validated_patterns_min_cpu: 8  # in cores
validated_patterns_min_memory: 16  # in GB

# SNO cluster minimums (override when CLUSTER_TOPOLOGY=sno)
validated_patterns_sno_min_nodes: 1
validated_patterns_sno_min_cpu: 8
validated_patterns_sno_min_memory: 32

# Cluster topology (auto-detected or override)
cluster_topology: "{{ lookup('env', 'CLUSTER_TOPOLOGY') | default('ha', true) }}"

# Required operators
validated_patterns_required_operators:
  - openshift-gitops-operator

# Optional operators
validated_patterns_optional_operators:
  - openshift-pipelines-operator
  - advanced-cluster-management

# GitOps auto-install (set to false to require manual installation)
validated_patterns_auto_install_gitops: true
validated_patterns_gitops_install_retries: 30
validated_patterns_gitops_install_delay: 10

# GPU management: scale down external GPU workloads to free resources for the platform
validated_patterns_free_gpu_from_external_workloads: true
validated_patterns_platform_namespace: "self-healing-platform"
